# ============================================================================
# SECURITY: Minimum release age for npm packages (supply-chain attack defense)
# ============================================================================
#
# This setting requires that any npm package version must have been published
# for at least 1 day (1440 minutes) before pnpm will allow installing it.
# This is a critical defense against supply-chain attacks.
#
minimumReleaseAge: 1440

packages:
  - artifacts/*
  - lib/*
  - lib/integrations/*
  - scripts

catalog:
  '@tailwindcss/vite': ^4.1.14
  '@tanstack/react-query': ^5.90.21
  '@types/node': ^25.3.3
  '@types/react': ^19.2.0
  '@types/react-dom': ^19.2.0
  '@vitejs/plugin-react': ^5.0.4
  class-variance-authority: ^0.7.1
  clsx: ^2.1.1
  drizzle-orm: ^0.45.1
  framer-motion: ^12.23.24
  lucide-react: ^0.545.0
  react: 19.1.0
  react-dom: 19.1.0
  tailwind-merge: ^3.3.1
  tailwindcss: ^4.1.14
  typescript: ^5.9.2
  vite: ^6.3.5
  wouter: ^3.7.1
  tsx: ^4.19.4
  zod: ^3.25.64

allowBuilds:
  '@clerk/shared': set this to true or false
  browser-tabs-lock: set this to true or false
  bufferutil: set this to true or false
  core-js: set this to true or false
  esbuild: set this to true or false
  utf-8-validate: set this to true or false

onlyBuiltDependencies:
  - '@clerk/shared'
  - browser-tabs-lock
  - bufferutil
  - core-js
  - esbuild
  - utf-8-validate